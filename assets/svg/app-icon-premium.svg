<svg width="512" height="512" viewBox="0 0 512 512" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bgGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#1a1a1a;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#050505;stop-opacity:1" />
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="6" result="blur" />
      <feComposite in="SourceGraphic" in2="blur" operator="over" />
    </filter>
  </defs>
  <!-- Background Tile -->
  <rect x="32" y="32" width="448" height="448" rx="80" fill="url(#bgGradient)" />
  <rect x="40" y="40" width="432" height="432" rx="72" fill="none" stroke="rgba(255,255,255,0.05)" stroke-width="2" />
  
  <!-- Waveform (Spotify Style) -->
  <g filter="url(#glow)">
    <rect x="120" y="220" width="24" height="72" rx="12" fill="#1DB954" />
    <rect x="160" y="190" width="24" height="132" rx="12" fill="#1DB954" />
    <rect x="200" y="140" width="24" height="232" rx="12" fill="#1DB954" />
    <rect x="244" y="200" width="24" height="112" rx="12" fill="#1DB954" />
    <rect x="288" y="160" width="24" height="192" rx="12" fill="#1DB954" />
    <rect x="328" y="210" width="24" height="92" rx="12" fill="#1DB954" />
    <rect x="368" y="230" width="24" height="52" rx="12" fill="#1DB954" />
  </g>
</svg>
