<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <meta http-equiv="Content-Security-Policy" content="default-src * 'unsafe-inline' 'unsafe-eval' data: blob:;">
    <title>Spotify Mini Player</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body class="theme-default">
    <div id="widget-container" data-tauri-drag-region>
        <!-- Unauthorized State -->
        <div id="auth-view" class="view">
            <div class="auth-content">
                <div class="spotify-logo">
                    <svg viewBox="0 0 24 24" width="32" height="32" fill="currentColor"><path d="M12 0C5.373 0 0 5.373 0 12s5.373 12 12 12 12-5.373 12-12S18.627 0 12 0zm5.508 17.302c-.223.367-.704.482-1.071.259-2.993-1.828-6.76-2.242-11.201-1.228-.42.095-.843-.176-.939-.596-.095-.42.176-.843.596-.939 4.887-1.114 9.043-.637 12.355 1.385.368.223.483.704.26 1.071zm1.472-3.26c-.28.455-.875.6-1.33.32-3.428-2.106-8.653-2.718-12.707-1.488-.512.155-1.047-.134-1.202-.646-.155-.512.134-1.047.646-1.202 4.63-1.404 10.39-.723 14.273 1.666.455.28.6.875.32 1.33zm.126-3.415c-4.11-2.44-10.878-2.664-14.787-1.477-.63.19-1.297-.164-1.488-.794-.19-.63.164-1.297.794-1.488 4.49-1.363 11.96-1.104 16.69 1.703.565.335.753 1.066.418 1.63-.335.565-1.066.753-1.63.418z"/></svg>
                </div>
                <h1>Spotify</h1>
                <p>Connect to start your session</p>
                <button id="connect-btn" class="primary-btn">Connect Spotify</button>
            </div>
        </div>

        <!-- Player State -->
        <div id="player-view" class="view" style="display: none;">
            <div id="player-main">
                <div class="art-container">
                    <img id="album-art" src="" alt="Album Art" />
                </div>
                <div id="track-info">
                    <div id="title-wrapper">
                        <div id="title">Not Playing</div>
                    </div>
                    <div id="artist"></div>
                </div>
                <div class="action-group">
                    <button id="reconnect-btn" class="icon-btn" title="Force Reconnect">
                        <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4"/><polyline points="16 17 21 12 16 7"/><line x1="21" y1="12" x2="9" y2="12"/></svg>
                    </button>
                    <button id="like-btn" class="icon-btn" title="Like">
                        <svg id="like-icon" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M20.8 4.6a5.5 5.5 0 0 0-7.8 0L12 5.6l-1-1a5.5 5.5 0 0 0-7.8 7.8L12 21l8.8-8.6a5.5 5.5 0 0 0 0-7.8z"/></svg>
                    </button>
                    <div id="controls">
                        <button id="shuffle-btn" class="icon-btn state-btn" title="Shuffle">
                            <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><path d="M16 3h5v5M4 20L21 3M21 16v5h-5M15 15l6 6M4 4l5 5"/></svg>
                        </button>
                        <button id="prev-btn" class="icon-btn control-btn">
                            <svg width="16" height="16" viewBox="0 0 24 24" fill="currentColor"><path d="M19 20L9 12L19 4V20ZM5 19H7V5H5V19Z"/></svg>
                        </button>
                        <button id="play-pause-btn" class="play-btn">
                            <svg id="play-icon" width="20" height="20" viewBox="0 0 24 24" fill="currentColor"><path d="M8 5V19L19 12L8 5Z"/></svg>
                            <svg id="pause-icon" width="20" height="20" viewBox="0 0 24 24" fill="currentColor" style="display:none"><path d="M6 19H10V5H6V19ZM14 5V19H18V5H14Z"/></svg>
                        </button>
                        <button id="next-btn" class="icon-btn control-btn">
                            <svg width="16" height="16" viewBox="0 0 24 24" fill="currentColor"><path d="M5 4L15 12L5 20V4ZM17 5H19V19H17V5Z"/></svg>
                        </button>
                        <button id="repeat-btn" class="icon-btn state-btn" title="Repeat">
                            <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><path d="M17 2.1l4 4-4 4"/><path d="M3 12.2v-2a4 4 0 0 1 4-4h12.8M7 21.9l-4-4 4-4"/><path d="M21 11.8v2a4 4 0 0 1-4 4H4.2"/></svg>
                        </button>
                    </div>
                    <button id="close-btn" class="icon-btn close-btn" title="Exit">
                        <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="3"><path d="M18 6L6 18M6 6l12 12"/></svg>
                    </button>
                </div>
            </div>
            <div id="progress-container">
                <input id="seek-bar" type="range" min="0" max="100" value="0" step="1" />
                <div id="seek-fill"></div>
            </div>
        </div>

        <!-- Message State -->
        <div id="message-view" class="view" style="display: none;">
            <div class="message-container">
                <p id="message-text"></p>
            </div>
        </div>
    </div>
    <script src="shim.js"></script>
    <script src="renderer.js"></script>
    <audio id="dummy-audio" loop>
        <source src="data:audio/wav;base64,UklGRigAAABXQVZFRm10IBAAAAABAAEARKwAAIhYAQACABAAZGF0YQAAAAA=" type="audio/wav">
    </audio>
</body>
</html>
